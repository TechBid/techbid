<!DOCTYPE html>
<html><head><title>Admin Login — TechBid</title>
<link rel="stylesheet" href="/static/css/style.css">
</head><body>
<div class="page-wrap" style="padding-top:80px;">
<div class="container" style="max-width:380px;">
  <div class="page-header" style="text-align:center;"><h1>Admin Login</h1></div>
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label class="form-label" for="admin-username">Username</label>
      <input id="admin-username" type="text" name="username" class="form-input" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label" for="admin-password">Password</label>
      <input id="admin-password" type="password" name="password" class="form-input" required>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Log in as Admin</button>
  </form>
</div>
</div>
</body></html>
