{% extends "base.html" %}
{% block title %}Forgot Password — TechBid{% endblock %}
{% block body %}
<div class="page-wrap">
<div class="container" style="max-width:440px;">
  <div class="page-header">
    <h1>Forgot your password?</h1>
    <p>Enter your account email and we will send you a reset link.</p>
  </div>

  <form method="POST" action="{{ url_for('forgot_password') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label class="form-label" for="forgot-email">Email address</label>
      <input id="forgot-email" type="email" name="email" class="form-input" required autofocus>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
  </form>

  <p class="mt-2 text-sm text-muted" style="text-align:center;">
    Remembered your password? <a href="{{ url_for('login') }}">Log in</a>
  </p>
</div>
</div>
{% endblock %}
