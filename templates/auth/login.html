{% extends "base.html" %}
{% block title %}Log In — TechBid{% endblock %}
{% block body %}
<div class="page-wrap">
<div class="container" style="max-width:440px;">
  <div class="page-header"><h1>Log in to TechBid</h1></div>

  <a href="{{ url_for('google_auth') }}" class="btn btn-secondary btn-block mb-2" style="gap:10px;">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </a>
  <div style="text-align:center;color:var(--text-light);font-size:.82rem;margin:12px 0;">or log in with email</div>

  <form method="POST" action="{{ url_for('login') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input id="email" type="email" name="email" class="form-input" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div style="position:relative;">
        <input id="password" type="password" name="password" class="form-input" required style="padding-right:42px;">
        <button type="button" aria-label="Show password" data-toggle-password="password"
                style="position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:transparent;cursor:pointer;color:var(--text-muted);padding:0;line-height:0;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path data-eye-open d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
            <circle data-eye-open cx="12" cy="12" r="3"></circle>
            <path data-eye-closed style="display:none;" d="M3 3l18 18"></path>
            <path data-eye-closed style="display:none;" d="M10.58 10.58a2 2 0 0 0 2.83 2.83"></path>
            <path data-eye-closed style="display:none;" d="M9.88 5.09A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a21.77 21.77 0 0 1-2.17 3.19"></path>
            <path data-eye-closed style="display:none;" d="M6.61 6.61A21.6 21.6 0 0 0 1 12s4 7 11 7a10.94 10.94 0 0 0 5.09-1.17"></path>
          </svg>
        </button>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Log in</button>
  </form>
  <p class="mt-2 text-sm" style="text-align:center;">
    <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
  </p>

  <p class="mt-2 text-sm text-muted" style="text-align:center;">
    Don't have an account? <a href="{{ url_for('register') }}">Sign up</a>
  </p>
</div>
</div>
<script>
  (function () {
    document.querySelectorAll('[data-toggle-password]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const input = document.getElementById(btn.getAttribute('data-toggle-password'));
        if (!input) return;
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
        btn.querySelectorAll('[data-eye-open]').forEach(function (el) { el.style.display = isHidden ? 'none' : ''; });
        btn.querySelectorAll('[data-eye-closed]').forEach(function (el) { el.style.display = isHidden ? '' : 'none'; });
      });
    });
  })();
</script>
{% endblock %}
