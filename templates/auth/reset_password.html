{% extends "base.html" %}
{% block title %}Reset Password — TechBid{% endblock %}
{% block body %}
<div class="page-wrap">
<div class="container" style="max-width:460px;">
  <div class="page-header">
    <h1>Reset your password</h1>
    <p>Choose a new password for your account.</p>
  </div>

  <form method="POST" action="{{ url_for('reset_password', token=token) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label class="form-label" for="new-password">New password</label>
      <div style="position:relative;">
        <input id="new-password" type="password" name="password" class="form-input" required minlength="8" style="padding-right:42px;">
        <button type="button" aria-label="Show password" data-toggle-password="new-password"
                style="position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:transparent;cursor:pointer;color:var(--text-muted);padding:0;line-height:0;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path data-eye-open d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
            <circle data-eye-open cx="12" cy="12" r="3"></circle>
            <path data-eye-closed style="display:none;" d="M3 3l18 18"></path>
            <path data-eye-closed style="display:none;" d="M10.58 10.58a2 2 0 0 0 2.83 2.83"></path>
            <path data-eye-closed style="display:none;" d="M9.88 5.09A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a21.77 21.77 0 0 1-2.17 3.19"></path>
            <path data-eye-closed style="display:none;" d="M6.61 6.61A21.6 21.6 0 0 0 1 12s4 7 11 7a10.94 10.94 0 0 0 5.09-1.17"></path>
          </svg>
        </button>
      </div>
      <div class="form-hint">Minimum 8 characters</div>
    </div>
    <div class="form-group">
      <label class="form-label" for="confirm-password">Confirm new password</label>
      <div style="position:relative;">
        <input id="confirm-password" type="password" name="confirm_password" class="form-input" required minlength="8" style="padding-right:42px;">
        <button type="button" aria-label="Show password" data-toggle-password="confirm-password"
                style="position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:transparent;cursor:pointer;color:var(--text-muted);padding:0;line-height:0;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path data-eye-open d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
            <circle data-eye-open cx="12" cy="12" r="3"></circle>
            <path data-eye-closed style="display:none;" d="M3 3l18 18"></path>
            <path data-eye-closed style="display:none;" d="M10.58 10.58a2 2 0 0 0 2.83 2.83"></path>
            <path data-eye-closed style="display:none;" d="M9.88 5.09A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a21.77 21.77 0 0 1-2.17 3.19"></path>
            <path data-eye-closed style="display:none;" d="M6.61 6.61A21.6 21.6 0 0 0 1 12s4 7 11 7a10.94 10.94 0 0 0 5.09-1.17"></path>
          </svg>
        </button>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Update password</button>
  </form>
</div>
</div>
<script>
  (function () {
    document.querySelectorAll('[data-toggle-password]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const input = document.getElementById(btn.getAttribute('data-toggle-password'));
        if (!input) return;
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
        btn.querySelectorAll('[data-eye-open]').forEach(function (el) { el.style.display = isHidden ? 'none' : ''; });
        btn.querySelectorAll('[data-eye-closed]').forEach(function (el) { el.style.display = isHidden ? '' : 'none'; });
      });
    });
  })();
</script>
{% endblock %}
